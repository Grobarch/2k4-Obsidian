name: Deploy Wiki to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "vault/**"
      - "scripts/**"
      - "quartz/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: quartz/package-lock.json

      - name: Install Quartz dependencies
        working-directory: quartz
        run: npm ci

      - name: Copy vault to Quartz content
        run: cp -r vault/* quartz/content/

      - name: Normalize frontmatter
        run: node scripts/vault-tools.mjs normalize --dir quartz/content --apply

      - name: Convert Obsidian Bases to static tables
        run: node scripts/build-bases.mjs quartz/content

      - name: Validate frontmatter
        run: node scripts/validate-frontmatter.mjs quartz/content/

      - name: Build Quartz
        working-directory: quartz
        run: node ./quartz/bootstrap-cli.mjs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
