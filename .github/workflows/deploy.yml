name: Deploy Wiki to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        working-directory: quartz
        run: npm ci

      - name: Copy vault to Quartz content
        run: cp -r vault/* quartz/content/

      - name: Update episode tables
        run: node scripts/update-episode-tables.mjs quartz/content/systemy

      - name: Update scenario lists
        run: node scripts/update-episode-tables.mjs quartz/content/scenariusze

      - name: Build Quartz
        working-directory: quartz
        run: npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
